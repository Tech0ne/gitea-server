name: gitea-stack

# ------------------------------------------------------------------
#  Postgres  ->  Gitea  ->  gitea-init (creates admin)  ->  runner(s)
#  Everything is driven by configs/stack.env.
#  Start with ./start.sh  (which runs: docker compose --env-file configs/stack.env up -d)
# ------------------------------------------------------------------

networks:
  gitea-net:
    driver: bridge

volumes:
  db_data:
  gitea_data:

services:

  # ---------------- Database (its own container) ----------------
  db:
    image: ${POSTGRES_IMAGE}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      TZ: ${TZ}
    volumes:
      - db_data:/var/lib/postgresql/data
    networks: [gitea-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ---------------- Gitea server --------------------------------
  gitea:
    image: ${GITEA_IMAGE}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      USER_UID: "1000"
      USER_GID: "1000"
      TZ: ${TZ}
      # --- database ---
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: db:5432
      GITEA__database__NAME: ${POSTGRES_DB}
      GITEA__database__USER: ${POSTGRES_USER}
      GITEA__database__PASSWD: ${POSTGRES_PASSWORD}
      GITEA__database__SSL_MODE: disable
      # --- server / URLs ---
      GITEA__server__DOMAIN: ${GITEA_DOMAIN}
      GITEA__server__ROOT_URL: ${GITEA_ROOT_URL}
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__SSH_DOMAIN: ${GITEA_DOMAIN}
      GITEA__server__SSH_PORT: "${SSH_PORT}"
      GITEA__server__SSH_LISTEN_PORT: "22"
      # --- skip the interactive web installer ---
      GITEA__security__INSTALL_LOCK: "true"
      # --- enable Gitea Actions ---
      GITEA__actions__ENABLED: "true"
      # --- the magic bit: global, reusable runner token (Gitea >= 1.23) ---
      GITEA_RUNNER_REGISTRATION_TOKEN: ${RUNNER_REGISTRATION_TOKEN}
    volumes:
      - gitea_data:/data
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${HTTP_PORT}:3000"
      - "${SSH_PORT}:22"
    networks: [gitea-net]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 30s

  # -------- One-shot: create the admin user, then exit ----------
  gitea-init:
    image: ${GITEA_IMAGE}
    depends_on:
      gitea:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      GITEA_ADMIN_USER: ${GITEA_ADMIN_USER}
      GITEA_ADMIN_PASSWORD: ${GITEA_ADMIN_PASSWORD}
      GITEA_ADMIN_EMAIL: ${GITEA_ADMIN_EMAIL}
    volumes:
      - gitea_data:/data
    networks: [gitea-net]
    user: "1000:1000"
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - |
        set -e
        CONF=/data/gitea/conf/app.ini
        echo "Ensuring admin user '$$GITEA_ADMIN_USER' exists..."
        if gitea --config "$$CONF" admin user create \
             --username "$$GITEA_ADMIN_USER" \
             --password "$$GITEA_ADMIN_PASSWORD" \
             --email    "$$GITEA_ADMIN_EMAIL" \
             --admin --must-change-password=false ; then
          echo "Admin user created."
        else
          echo "Admin user already exists (or was skipped) - continuing."
        fi

  # ---------------- Action runner(s) ----------------------------
  # Scaled via RUNNER_REPLICAS in stack.env. Each replica registers
  # itself automatically using the shared token above.
  runner:
    image: ${RUNNER_IMAGE}
    restart: unless-stopped
    depends_on:
      gitea:
        condition: service_healthy
    environment:
      TZ: ${TZ}
      GITEA_INSTANCE_URL: http://gitea:3000
      GITEA_RUNNER_REGISTRATION_TOKEN: ${RUNNER_REGISTRATION_TOKEN}
      GITEA_RUNNER_LABELS: ${RUNNER_LABELS}
      CONFIG_FILE: /config.yaml
    volumes:
      - ./configs/runner.yaml:/config.yaml:ro
      # Docker-out-of-Docker: jobs run as sibling containers on the host.
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [gitea-net]
    deploy:
      replicas: ${RUNNER_REPLICAS}
